services:
  # 1. FastAPI Backend Service
  - type: web
    name: traffic-backend
    runtime: python
    buildCommand: pip install --upgrade pip && pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt
    startCommand: python -m uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENV
        value: production

  # 2. Streamlit Frontend Service
  - type: web
    name: traffic-frontend
    runtime: python
    buildCommand: pip install --upgrade pip && pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt && python ml/predict.py
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TRAFFIC_API_URL
        fromService:
          name: traffic-backend
          type: web
          property: host
